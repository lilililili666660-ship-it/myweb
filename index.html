<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>闺蜜专属网站</title>
<style>
    body{
        margin:0;
        overflow:hidden;
        background: linear-gradient(135deg,#ffd1dc,#ffb6c1,#ffc0cb);
        font-family: "Arial","PingFang SC","Microsoft YaHei";
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
    }

    .card{
        text-align:center;
        padding:40px;
        border-radius:25px;
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1{
        font-size:50px;
        color:#fff;
        text-shadow: 0 0 15px #ff69b4;
        margin-bottom:20px;
        animation: pop 1.5s ease-in-out infinite alternate;
    }

    p{
        font-size:20px;
        color:#fff;
        margin-top:10px;
    }

    button{
        margin-top:20px;
        padding:12px 25px;
        border:none;
        border-radius:30px;
        background:#ff69b4;
        color:white;
        font-size:16px;
        cursor:pointer;
        box-shadow:0 5px 15px rgba(255,105,180,0.5);
    }

    button:hover{
        transform:scale(1.1);
    }

    @keyframes pop{
        from{transform:scale(1);}
        to{transform:scale(1.05);}
    }

    .heart{
        position:absolute;
        color:#ff4d6d;
        font-size:20px;
        animation: float 6s linear infinite;
    }

    @keyframes float{
        0%{transform:translateY(100vh) scale(0.5);opacity:1;}
        100%{transform:translateY(-10vh) scale(1.5);opacity:0;}
    }
</style>
</head>

<body>

<div class="card">
    <h1 id="title">闺蜜我爱你</h1>
    <p>黎莎莎和苏萌要当一辈子好闺蜜</p>
    <button onclick="showLove()">点我一下 💗</button>
</div>

<script>
function showLove(){
    document.getElementById("title").innerText = "我永远爱你 💖";
}

// 爱心生成
function createHeart(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💗";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20 + 10) + "px";
    heart.style.animationDuration = (Math.random()*3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
